name: Azure Static Web Apps CI/CD

# Deploys the static site + the /api Azure Functions to Azure Static Web Apps.
#
# NOTE: This replaces GitHub Pages as the host for bondcasts.com. Pages and SWA
# can't both serve the apex domain — once the SWA custom domain is verified and
# DNS points at it, delete (or disable) .github/workflows/deploy.yml so the two
# don't fight. Until then this workflow can run against the SWA default hostname.
#
# Requires repo secret AZURE_STATIC_WEB_APPS_API_TOKEN (deployment token from the
# Static Web App resource in the Azure portal).

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          # Repo root is the static content; the Functions live in /api.
          app_location: "/"
          api_location: "api"
          output_location: ""

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
