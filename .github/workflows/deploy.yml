name: Deploy to GitHub Pages

on:
  # Deploy automatically on every push to main
  push:
    branches: [main]
  # ...and allow manual runs from the Actions tab (the "Run workflow" button)
  workflow_dispatch:

# Least-privilege permissions needed to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # This is a plain static site — publish the repo root as-is
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
